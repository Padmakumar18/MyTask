<div class="home-container">
  <!-- Mobile Header with Hamburger -->
  <header class="mobile-header">
    <h1 class="mobile-title">Dashboard</h1>
    <button
      class="hamburger-btn"
      (click)="toggleMobileMenu()"
      [attr.aria-label]="isMobileMenuOpen() ? 'Close menu' : 'Open menu'"
    >
      @if (isMobileMenuOpen()) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      }
    </button>
  </header>

  <!-- Sidebar Navigation (Desktop) / Mobile Menu -->
  <nav class="sidebar" [class.mobile-open]="isMobileMenuOpen()">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Navigation</h2>
    </div>
    <ul class="nav-list">
      @for (item of navItems; track item.path) {
        <li>
          <button
            class="nav-btn"
            [class.active]="isActive(item.path)"
            (click)="navigateTo(item.path)"
          >
            {{ item.label }}
          </button>
        </li>
      }
    </ul>
  </nav>

  <!-- Main Content Area with Router Outlet -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Mobile Menu Overlay -->
  @if (isMobileMenuOpen()) {
    <div class="mobile-overlay" (click)="toggleMobileMenu()"></div>
  }
</div>
